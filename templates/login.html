<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Evosys</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --border: #e5e7eb;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --text: #111827;
            --muted: #6b7280;
            --shadow: 0 4px 12px rgba(17, 24, 39, 0.08);
            --fs-xs: 0.75rem;
            --fs-sm: 0.85rem;
            --fs-md: 0.95rem;
            --fs-base: 1rem;
            --fs-lg: 1.25rem;
            --fs-xl: 1.5rem;
            --fs-xxl: 1.75rem;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: min(420px, 100%);
            background: var(--panel);
            border-radius: 12px;
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand h1 {
            margin: 0;
            font-size: var(--fs-xl);
        }

        .brand p {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: var(--fs-md);
        }

        .brand img {
            height: 64px;
            width: 64px;
            object-fit: contain;
            border-radius: 10px;
            border: 1px solid var(--border);
            padding: 6px;
            background: #fff;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 600;
            font-size: var(--fs-md);
            color: var(--muted);
        }

        input {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 1rem;
            font-family: inherit;
            background: #fff;
            transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
        }

        .helper {
            font-size: var(--fs-sm);
            color: var(--muted);
        }

        .primary-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: var(--fs-base);
            font-weight: 600;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
        }

        .error {
            font-size: 0.9rem;
            color: #dc2626;
        }
    </style>
    <script>
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
    </script>
</head>
<body>
    <div class="app-shell">
        <main class="auth-card">
            <div class="brand">
                <img src="{{ brand_logo or url_for('static', filename='evosys-logo.png') }}" alt="Logo">
                <div>
                    <h1>Entrar</h1>
                    <p>Acesse o gerador de etiquetas Evosys</p>
                </div>
            </div>
            <form method="post" action="{{ url_for('login', **request.args) }}">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input id="username" name="username" type="text" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input id="password" name="password" type="password" required>
                </div>
                <button class="primary-btn" type="submit">Entrar</button>
                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}
            </form>
        </main>
    </div>
</body>
</html>
